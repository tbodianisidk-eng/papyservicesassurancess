version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assurance_postgres
    restart: always
    environment:
      POSTGRES_DB: assurance_sante_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: assurance_postgres_data
